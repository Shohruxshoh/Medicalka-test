services:
  # One-shot service: apply DB migrations, then exit. Everything else waits for it.
  migrate:
    build: .
    container_name: social_migrate
    command: alembic upgrade head
    volumes:
      - ./:/code
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  app:
    build: .
    container_name: social_app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./:/code            # mount source so code changes are picked up live
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully

  db:
    image: postgres:16-alpine
    container_name: social_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: social
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d social"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: social_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  worker:
    build: .
    container_name: social_worker
    command: celery -A app.tasks.celery_app:celery_app worker --loglevel=info
    volumes:
      - ./:/code
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      migrate:
        condition: service_completed_successfully

  beat:
    build: .
    container_name: social_beat
    command: celery -A app.tasks.celery_app:celery_app beat --loglevel=info
    volumes:
      - ./:/code
    env_file:
      - .env
    depends_on:
      - redis
      - worker

volumes:
  postgres_data:
  redis_data:
