# Host-nginx vhost for social.n-shohrux.uz (behind Cloudflare).
# Reuses the existing Cloudflare Origin certificate and proxies to the app
# published by docker-compose.server.yml on 127.0.0.1:8100.
#
# Install:
#   sudo cp deploy/social-api.nginx.conf /etc/nginx/sites-available/social-api
#   sudo ln -sf /etc/nginx/sites-available/social-api /etc/nginx/sites-enabled/social-api
#   sudo nginx -t && sudo systemctl reload nginx

# HTTP -> HTTPS
server {
    listen 80;
    server_name social.n-shohrux.uz;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    server_name social.n-shohrux.uz;

    ssl_certificate     /etc/nginx/ssl/n-shohrux.crt;
    ssl_certificate_key /etc/nginx/ssl/n-shohrux.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 10M;

    # Restore the real visitor IP from Cloudflare (so rate limiting is accurate).
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    location / {
        proxy_pass http://127.0.0.1:8100;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_read_timeout 300;
    }
}
