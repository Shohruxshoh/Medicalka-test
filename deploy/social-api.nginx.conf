# Host-nginx vhost for the mini social network API.
# Copy to /etc/nginx/sites-available/social-api and symlink into sites-enabled,
# OR place in /etc/nginx/conf.d/social-api.conf. Then:
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d social.n-shohrux.uz     # add HTTPS (uses your existing certbot)

server {
    listen 80;
    server_name social.n-shohrux.uz;          # <-- CHANGE to your subdomain

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:8100;     # the app published by docker-compose.server.yml
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }
}
